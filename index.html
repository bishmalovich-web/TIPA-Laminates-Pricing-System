<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#10bcd4"><title>TIPA Laminates Exact Calculator</title><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon-192.png"><style>*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#e9fbff,#fff);color:#111827}.conf{background:#102a33;color:#fff;text-align:center;padding:11px;font-weight:900;letter-spacing:.08em}.top{max-width:1180px;margin:auto;padding:24px 16px;display:flex;justify-content:space-between;gap:18px;align-items:center}.brand{display:flex;gap:16px;align-items:center}.logo{width:82px;height:82px;border-radius:20px;box-shadow:0 12px 30px rgba(0,172,200,.22)}h1{margin:0;font-size:30px}.sub{color:#5b6b76;margin:5px 0}.version{display:inline-block;background:#c8f7c5;border:1px solid #22a447;border-radius:999px;padding:5px 10px;font-weight:900;color:#064e1b}.noUpload{display:inline-block;background:#ffe8e8;border:1px solid #ff8888;border-radius:999px;padding:5px 10px;font-weight:900;color:#8a0000;margin-left:6px}.btn{border:0;border-radius:13px;padding:12px 16px;font-weight:900;cursor:pointer;background:#10bcd4;color:#fff}.btn.dark{background:#102a33}.btn.light{background:#fff;color:#0b8aa0;border:1px solid #cdeef5}.wrap{max-width:1180px;margin:auto;padding:0 16px 34px}.grid{display:grid;grid-template-columns:1fr;gap:18px}.grid.multi{grid-template-columns:repeat(2,1fr)}.calc{background:#fff;border:1px solid #bfe7f0;border-radius:22px;overflow:hidden;box-shadow:0 18px 45px rgba(0,172,200,.15)}.head{background:#245a86;color:#fff;text-align:center;padding:13px;font-size:19px;font-weight:900}.row{display:grid;grid-template-columns:42% 42% 16%;border-bottom:1px solid #9cc9dc}.row label{background:#d7e5f1;font-weight:800;padding:10px 12px}.val{background:#eaf8dc;text-align:center;font-weight:800;padding:6px 8px;min-height:42px}.unit{background:#eaf8dc;padding:10px 8px}select,input{width:100%;height:36px;border:3px solid #0ea5b7!important;background:#fff!important;color:#052f38;border-radius:9px;text-align:center;text-align-last:center;font-weight:900;font-size:15px;appearance:auto!important;-webkit-appearance:menulist!important}.flag{font-size:11px;color:#075e6e;font-weight:900;margin-top:2px}.section{background:#2e82c3;color:#fff;text-align:center;padding:9px;font-weight:900}.sell{background:#ffd866;text-align:center;font-weight:900;padding:7px}.sellPrice{font-size:26px;background:#fff4c9;text-align:center;padding:13px;font-weight:900}.layers{padding:12px 16px;background:#f8fdff}.compare{display:none;margin-top:18px;background:white;border:1px solid #bfe7f0;border-radius:22px;padding:18px}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #e6f4f7;padding:10px;text-align:left}th{background:#effbfe;color:#07566a}.exact{background:#d9fbe1;border-left:5px solid #16a34a;padding:10px;margin:12px 0;border-radius:8px}@media(max-width:900px){.grid.multi{grid-template-columns:1fr}.top{flex-direction:column;align-items:flex-start}.row{grid-template-columns:38% 45% 17%}h1{font-size:24px}}</style></head><body><div class="conf">CONFIDENTIAL — TIPA INTERNAL PRICING DATA — DO NOT SHARE EXTERNALLY</div><header class="top"><div class="brand"><img class="logo" src="icon-192.png"><div><h1>TIPA Laminates Exact Calculator</h1><p class="sub">Calculator UI like before — no upload field inside the app.</p><span class="version">VERSION: CLEAN EXACT CALCULATOR V10</span><span class="noUpload">NO FILE UPLOAD FIELD</span></div></div><div><button class="btn" id="addBtn" onclick="addComparison()">+ Add comparison</button> <button class="btn light" onclick="resetOne()">Reset to one</button> <button class="btn dark" onclick="installApp()">⬇️ Download as App</button></div></header><main class="wrap"><section id="cards" class="grid"></section><section id="comparison" class="compare"><h2>Comparison</h2><table><thead><tr><th>#</th><th>Laminate</th><th>Thickness</th><th>Amount</th><th>Cost/Kg €</th><th>Sell €</th><th>Sell $</th></tr></thead><tbody id="cmp"></tbody></table></section></main><script>const DATA=[{"Laminate": "823", "Total Thickness": "121", "Width": "760", "Amount": "5000", "PR/NonPR": "Printed", "Colors": "5-8", "Shipment": "Europe to US", "Supplier": "Bastin", "Margin": "0.25", "Laminate Length": "54933", "Total Cost EUR": "€69,295.84", "Total Cost USD": "$80,383.17", "Cost/Kg EUR": "€13.86", "Cost/Kg USD": "$16.08", "Sell Price EUR": "€17.32", "Sell Price USD": "$20.09", "Structure": "NK 23µ | TIPA 312 MET 25µ | Billerud Kraft White Paper 67µ | RM G Epotal ECO 3675 6µ"}, {"Laminate": "618", "Total Thickness": "60", "Width": "760", "Amount": "5000", "PR/NonPR": "Printed", "Colors": "5-8", "Shipment": "Europe to US", "Supplier": "Bastin", "Margin": "0.20", "Laminate Length": "83,002", "Total Cost EUR": "€72,654.26", "Total Cost USD": "$84,278.94", "Cost/Kg EUR": "€14.53", "Cost/Kg USD": "$16.86", "Sell Price EUR": "€17.44", "Sell Price USD": "$20.23", "Structure": "NK 23µ | TIPA 302FG 33µ | RM G Epotal ECO 3675 3µ"}, {"Laminate": "428", "Total Thickness": "79", "Width": "760", "Amount": "5000", "PR/NonPR": "Not Printed", "Colors": "0", "Shipment": "Europe to US", "Supplier": "Bastin", "Margin": "0.20", "Laminate Length": "61,348", "Total Cost EUR": "€105,474.72", "Total Cost USD": "$122,350.68", "Cost/Kg EUR": "€21.09", "Cost/Kg USD": "$24.47", "Sell Price EUR": "€25.31", "Sell Price USD": "$29.36", "Structure": "NK 23µ | TIPA 312 MET 25µ | TIPA 312 MET 25µ | RM G Epotal ECO 3675 6µ"}, {"Laminate": "608", "Total Thickness": "100", "Width": "900", "Amount": "7000", "PR/NonPR": "Not Printed", "Colors": "0", "Shipment": "Europe to Europe", "Supplier": "Bastin", "Margin": "0.25", "Laminate Length": "56,956", "Total Cost EUR": "€67,585.10", "Total Cost USD": "$78,398.71", "Cost/Kg EUR": "€9.66", "Cost/Kg USD": "$11.20", "Sell Price EUR": "€12.08", "Sell Price USD": "$14.00", "Structure": "NK 23µ | TIPA 302FG 60µ | PBAT 17µ"}];let visible=1;const fields=['Laminate','Total Thickness','Width','Amount','PR/NonPR','Colors','Shipment','Supplier','Margin'];const resultFields=['Laminate Length','Total Cost EUR','Total Cost USD','Cost/Kg EUR','Cost/Kg USD','Sell Price EUR','Sell Price USD'];function uniq(f,subset=DATA){return [...new Set(subset.map(r=>String(r[f])))]}function opts(a,s){return a.map(v=>`<option ${String(v)===String(s)?'selected':''}>${v}</option>`).join('')}function flag(){return '<div class="flag">▼ dropdown</div>'}function exact(o){return DATA.find(r=>fields.every(f=>String(r[f])===String(o[f])))}function state(id){let o={};fields.forEach(f=>o[f]=document.querySelector(`#calc${id} [data-f="${f}"]`).value);return o}function updateFilteredOptions(id){let base={};fields.forEach(f=>{let el=document.querySelector(`#calc${id} [data-f="${f}"]`);base[f]=el.value});fields.forEach((f,i)=>{let el=document.querySelector(`#calc${id} [data-f="${f}"]`);let filtered=DATA.filter(r=>fields.slice(0,i).every(prev=>String(r[prev])===String(base[prev])));let values=uniq(f,filtered);if(!values.includes(el.value))el.value=values[0];el.innerHTML=opts(values,el.value);})}function card(id,row,hide){return `<section class="calc" id="calc${id}" style="display:${hide?'none':'block'}"><div class="head">▣ LAMINATE CALCULATOR ${id}</div>${fields.map(f=>`<div class="row"><label>${f}</label><div class="val"><select data-f="${f}" onchange="updateFilteredOptions(${id});refresh(${id})">${opts(uniq(f),row[f])}</select>${flag()}</div><div class="unit">select</div></div>`).join('')}<div id="msg${id}"></div><div class="section">▧ RESULTS</div><div id="res${id}"></div><div class="sell">▦ SELL PRICE</div><div class="sellPrice" id="sell${id}"></div><div class="layers" id="structure${id}"></div></section>`}function refresh(id){let r=exact(state(id));if(!r)return;document.getElementById('msg'+id).innerHTML='<div class="exact">Exact Excel value used.</div>';document.getElementById('res'+id).innerHTML=resultFields.filter(f=>!f.includes('Sell Price')).map(f=>`<div class="row"><label>${f}</label><div class="val">${r[f]}</div><div class="unit"></div></div>`).join('');document.getElementById('sell'+id).textContent=r['Sell Price EUR'];document.getElementById('structure'+id).textContent='Structure from Excel: '+r.Structure;compare()}function addComparison(){if(visible<3){visible++;document.getElementById('calc'+visible).style.display='block';document.getElementById('cards').classList.add('multi');refresh(visible)}if(visible>=3)document.getElementById('addBtn').disabled=true}function resetOne(){visible=1;[2,3].forEach(i=>document.getElementById('calc'+i).style.display='none');document.getElementById('cards').classList.remove('multi');document.getElementById('addBtn').disabled=false;refresh(1)}function compare(){let rows=[];for(let i=1;i<=visible;i++){let r=exact(state(i));rows.push(`<tr><td>${i}</td><td>${r.Laminate}</td><td>${r['Total Thickness']}µ</td><td>${r.Amount}</td><td>${r['Cost/Kg EUR']}</td><td>${r['Sell Price EUR']}</td><td>${r['Sell Price USD']}</td></tr>`)}document.getElementById('cmp').innerHTML=rows.join('');document.getElementById('comparison').style.display=visible>1?'block':'none'}function installApp(){alert('Install: iPhone Safari → Share → Add to Home Screen. Android/Chrome/Edge → menu → Install app.')}document.getElementById('cards').innerHTML=card(1,DATA[0],false)+card(2,DATA[1],true)+card(3,DATA[2],true);[1,2,3].forEach(i=>{updateFilteredOptions(i);refresh(i)});if('serviceWorker'in navigator)navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).finally(()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));</script></body></html>
