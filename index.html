<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>TIPA Laminates Pricing Calculator</title><link rel=manifest href=manifest.webmanifest><link rel=icon href=icon-192.png><style>*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial;background:linear-gradient(135deg,#e8fcff,#f9ffff);color:#102a33}.conf{background:#102a33;color:#fff;text-align:center;padding:11px;font-weight:900}.top,.wrap{max-width:1160px;margin:auto;padding:20px}.brand{display:flex;align-items:center;gap:16px}.logo{width:84px;border-radius:20px}.btn{border:0;border-radius:14px;background:#10bcd4;color:#fff;padding:12px 16px;font-weight:900;cursor:pointer}.btn.light{background:white;color:#07859d;border:1px solid #cfeef5}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 16px}.grid{display:grid;grid-template-columns:1fr;gap:18px}.grid.multi{grid-template-columns:repeat(auto-fit,minmax(310px,1fr))}.card,.compare{background:white;border:1px solid #cfeef5;border-radius:24px;box-shadow:0 18px 45px #00acc825;overflow:hidden}.head{background:linear-gradient(135deg,#10bcd4,#7ee7f4);color:white;padding:17px;font-weight:900;font-size:20px}.body,.compare{padding:17px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-bottom:12px}.field label{display:block;font-size:12px;font-weight:900;color:#365;text-transform:uppercase;margin-bottom:5px}input,select{width:100%;border:1px solid #cae9f0;background:#faffff;border-radius:14px;padding:11px}.result{margin-top:14px;background:#f0fcff;border:1px solid #cfeef5;border-radius:20px;padding:14px}.money{font-size:30px;font-weight:900;color:#07859d}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.kpi{background:white;border:1px solid #def2f6;border-radius:14px;padding:9px}.kpi span{display:block;color:#607781;font-size:12px}.layer{display:grid;grid-template-columns:1fr auto auto;gap:8px;border-bottom:1px solid #eef6f8;padding:7px 0;font-size:13px}.compare{display:none;margin-top:20px}table{width:100%;border-collapse:collapse}td,th{padding:9px;border-bottom:1px solid #e5f4f7;text-align:left}@media(max-width:620px){.row{grid-template-columns:1fr}.money{font-size:25px}}</style></head><body><div class=conf>CONFIDENTIAL — TIPA INTERNAL PRICING DATA — DO NOT SHARE EXTERNALLY</div><header class=top><div class=brand><img class=logo src=icon-192.png><div><h1>TIPA Laminates Pricing Calculator</h1><p>One calculator first. Add comparison calculators only when needed.</p></div></div><button class=btn onclick=installApp()>⬇️ Download as App</button></header><main class=wrap><div class=toolbar><button id=add class=btn onclick=addCalc()>➕ Add calculator for comparison</button><button class="btn light" onclick=resetOne()>Show only calculator 1</button></div><section id=cards class=grid></section><section id=comparison class=compare><h2>Comparison Table</h2><table><thead><tr><th>#</th><th>Laminate</th><th>Amount</th><th>Length</th><th>Cost/Kg €</th><th>Sell €</th><th>Sell $</th></tr></thead><tbody id=cmp></tbody></table></section></main><script>const D={"defaults":[{"laminate":"618","amount":5000,"width":760,"printed":"Printed","colors":"5-8","shipment":"Europe to US","supplier":"Bastin","margin":0.2,"length":83001.74137653408,"rm":9.88707301331182,"ship":4.35,"services":0.293778,"costKg":14.53085101331182,"sell":17.437021215974184,"usd":20.22694461053005,"total":72654.2550665591},{"laminate":"428","amount":5000,"width":760,"printed":"Not Printed","colors":0,"shipment":"Europe to US","supplier":"Bastin","margin":0.2,"length":61348.037230896836,"rm":16.610691475057145,"ship":4.35,"services":0.134253,"costKg":21.094944475057147,"sell":25.313933370068575,"usd":29.364162709279544,"total":105474.72237528574},{"laminate":"608","amount":7000,"width":900,"printed":"Not Printed","colors":0,"shipment":"Europe to Europe","supplier":"Bastin","margin":0.25,"length":56956.180355813405,"rm":9.320760727560062,"ship":0.2,"services":0.134253,"costKg":9.65501372756006,"sell":12.068767159450076,"usd":13.999769904962086,"total":67585.09609292043}],"lams":["618","428","608"],"layers":{"618":[{"name":"NK","t":23,"price":7.95},{"name":"TIPA 302FG","t":33,"price":3.5997120000000002},{"name":"RM G Epotal ECO 3675","t":3,"price":4.65}],"428":[{"name":"NK","t":23,"price":7.95},{"name":"TIPA 312 MET","t":25,"price":8.177378},{"name":"TIPA 312 MET","t":25,"price":8.177378},{"name":"RM G Epotal ECO 3675","t":12,"price":4.65}],"608":[{"name":"NK","t":23,"price":7.95},{"name":"TIPA 302FG","t":60,"price":3.5997120000000002},{"name":"PBAT","t":17,"price":1.5}]},"exchange":1.16};let visible=1;const eur=new Intl.NumberFormat('en-US',{style:'currency',currency:'EUR',maximumFractionDigits:2}),usd=new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2}),num=new Intl.NumberFormat('en-US',{maximumFractionDigits:0});function opt(a,v){return a.map(x=>`<option ${String(x)===String(v)?'selected':''}>${x}</option>`).join('')}function N(v,d=0){v=parseFloat(v);return Number.isFinite(v)?v:d}function card(i,d){return `<section class=card id=card${i} style="display:${i<=visible?'block':'none'}"><div class=head>📊 Laminate Calculator ${i}</div><div class=body><div class=field><label>Margin %</label><input data-k=margin type=number step=.01 value='${d.margin}'></div><div class=row><div class=field><label>Laminate</label><select data-k=laminate>${opt(D.lams,d.laminate)}</select></div><div class=field><label>Amount Kg</label><input data-k=amount type=number value='${d.amount}'></div></div><div class=row><div class=field><label>Width of Reel mm</label><input data-k=width type=number value='${d.width}'></div><div class=field><label>PR / NonPR</label><select data-k=printed>${opt(['Printed','Not Printed'],d.printed)}</select></div></div><div class=row><div class=field><label>No. colors</label><select data-k=colors>${opt([0,'1-2','3-4','5-8'],d.colors)}</select></div><div class=field><label>Shipment</label><select data-k=shipment>${opt(['Europe to Europe','Europe to US','Europe to Canada'],d.shipment)}</select></div></div><div class=field><label>Supplier</label><select data-k=supplier>${opt(['Bastin','Marma'],d.supplier)}</select></div><button class=btn onclick='go(${i})'>Calculate</button><div class=result id=result${i}></div></div></section>`}function read(i){let o={};document.querySelectorAll(`#card${i} [data-k]`).forEach(e=>o[e.dataset.k]=e.value);return o}function calc(o,i){let base=D.defaults[i-1];let cost=N(base.costKg), amount=N(o.amount,base.amount), margin=N(o.margin,base.margin), sell=cost*(1+margin);return{cost,total:cost*amount,sell,usd:sell*D.exchange,length:base.length,rm:base.rm,services:base.services,layers:D.layers[o.laminate]||D.layers[base.laminate]}}function out(i,r){document.getElementById('result'+i).innerHTML=`<div class=money>${eur.format(r.sell)} <small>/Kg</small></div><b>Sell Price USD:</b> ${usd.format(r.usd)} /Kg<div class=kpis><div class=kpi><span>Total Cost</span><b>${eur.format(r.total)}</b></div><div class=kpi><span>Cost/Kg</span><b>${eur.format(r.cost)}</b></div><div class=kpi><span>Laminate Length</span><b>${num.format(r.length)} m</b></div><div class=kpi><span>RM / Services</span><b>${eur.format(r.rm)} / ${eur.format(r.services)}</b></div></div>${r.layers.map(x=>`<div class=layer><span>${x.name}</span><span>${x.t}µ</span><span>${eur.format(x.price)}/kg</span></div>`).join('')}`}function go(i){out(i,calc(read(i),i));compare()}function addCalc(){if(visible<3){visible++;document.getElementById('card'+visible).style.display='block';document.getElementById('cards').classList.add('multi');document.getElementById('comparison').style.display='block';go(visible)}if(visible>=3)document.getElementById('add').disabled=true}function resetOne(){visible=1;[2,3].forEach(i=>document.getElementById('card'+i).style.display='none');document.getElementById('cards').classList.remove('multi');document.getElementById('comparison').style.display='none';document.getElementById('add').disabled=false;go(1)}function compare(){document.getElementById('cmp').innerHTML=[1,2,3].filter(i=>i<=visible).map(i=>{let o=read(i),r=calc(o,i);return `<tr><td>${i}</td><td>${o.laminate}</td><td>${o.amount}</td><td>${num.format(r.length)} m</td><td>${eur.format(r.cost)}</td><td>${eur.format(r.sell)}</td><td>${usd.format(r.usd)}</td></tr>`}).join('')}function installApp(){alert('Install app: iPhone Safari → Share → Add to Home Screen. Android/Chrome/Edge → menu → Install app.')}document.getElementById('cards').innerHTML=D.defaults.map((d,i)=>card(i+1,d)).join('');[1,2,3].forEach(go);resetOne();if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});</script></body></html>
