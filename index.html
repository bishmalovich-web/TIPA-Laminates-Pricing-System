<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#10bcd4"><title>TIPA Exact Lookup Calculator</title><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon-192.png"><style>*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#e9fbff,#fff);color:#111827}.conf{background:#102a33;color:#fff;text-align:center;padding:11px;font-weight:900;letter-spacing:.08em}.top{max-width:1180px;margin:auto;padding:24px 16px;display:flex;justify-content:space-between;gap:18px;align-items:center}.brand{display:flex;gap:16px;align-items:center}.logo{width:82px;height:82px;border-radius:20px}h1{margin:0;font-size:30px}.sub{color:#5b6b76}.version{display:inline-block;background:#c8f7c5;border:1px solid #22a447;border-radius:999px;padding:5px 10px;font-weight:900;color:#064e1b}.btn{border:0;border-radius:13px;padding:12px 16px;font-weight:900;cursor:pointer;background:#102a33;color:#fff}.wrap{max-width:1180px;margin:auto;padding:0 16px 34px}.calc,.upload{background:#fff;border:1px solid #bfe7f0;border-radius:22px;overflow:hidden;box-shadow:0 18px 45px rgba(0,172,200,.15);margin-bottom:16px}.upload{padding:14px}.head{background:#245a86;color:#fff;text-align:center;padding:13px;font-size:19px;font-weight:900}.row{display:grid;grid-template-columns:42% 42% 16%;border-bottom:1px solid #9cc9dc}.row label{background:#d7e5f1;font-weight:800;padding:10px 12px}.val{background:#eaf8dc;text-align:center;font-weight:800;padding:6px 8px;min-height:42px}.unit{background:#eaf8dc;padding:10px 8px}select,input{width:100%;height:36px;border:3px solid #0ea5b7!important;background:#fff!important;color:#052f38;border-radius:9px;text-align:center;text-align-last:center;font-weight:900;font-size:15px}.section{background:#2e82c3;color:#fff;text-align:center;padding:9px;font-weight:900}.sell{background:#ffd866;text-align:center;font-weight:900;padding:7px}.sellPrice{font-size:26px;background:#fff4c9;text-align:center;padding:13px;font-weight:900}.exact{background:#d9fbe1;border-left:5px solid #16a34a;padding:10px;margin:12px 0;border-radius:8px}.warn{background:#fff7d6;border-left:5px solid #ffc107;padding:10px;margin:12px 0;border-radius:8px}.layers{padding:12px 16px;background:#f8fdff}</style></head><body><div class="conf">CONFIDENTIAL — TIPA INTERNAL PRICING DATA — DO NOT SHARE EXTERNALLY</div><header class="top"><div class="brand"><img class="logo" src="icon-192.png"><div><h1>TIPA Exact Lookup Calculator</h1><p class="sub">Excel values only — no formula approximation.</p><span class="version">VERSION: EXCEL LOOKUP BUILDER V8</span></div></div><button class="btn" onclick="installApp()">⬇️ Download as App</button></header><main class="wrap"><div class="upload"><b>Upload web_lookup.csv if you generated a new one from Excel:</b><input type="file" accept=".csv" onchange="loadCsvFile(event)"></div><section class="calc"><div class="head">▣ LAMINATE EXACT LOOKUP</div><div id="inputs"></div><div id="msg"></div><div class="section">▧ RESULTS</div><div id="results"></div><div class="layers" id="structure"></div></section></main><script>let DATA=[{"Laminate": "823", "Total Thickness": "121", "Width of Reel": "760", "Amount": "5000", "PR/NonPR": "Printed", "No of Colors": "5-8", "Shipment": "Europe to US", "Supplier": "Bastin", "Margin": "0.25", "Laminate Length": "54933", "Total Cost EUR": "69295.84", "Total Cost USD": "80383.17", "Cost/Kg EUR": "13.859168", "Cost/Kg USD": "16.07663488", "Sell Price EUR": "17.32", "Sell Price USD": "20.09", "Structure": "NK 23 | TIPA 312 MET 25 | Billerud Kraft White Paper 67 | RM G Epotal ECO 3675 6"}, {"Laminate": "618", "Total Thickness": "60", "Width of Reel": "760", "Amount": "5000", "PR/NonPR": "Printed", "No of Colors": "5-8", "Shipment": "Europe to US", "Supplier": "Bastin", "Margin": "0.20", "Laminate Length": "83001.74137653408", "Total Cost EUR": "72654.26", "Total Cost USD": "84278.94", "Cost/Kg EUR": "14.530852", "Cost/Kg USD": "16.85578832", "Sell Price EUR": "17.44", "Sell Price USD": "20.23", "Structure": "NK 23 | TIPA 302FG 33 | RM G Epotal ECO 3675 3"}, {"Laminate": "428", "Total Thickness": "79", "Width of Reel": "760", "Amount": "5000", "PR/NonPR": "Not Printed", "No of Colors": "0", "Shipment": "Europe to US", "Supplier": "Bastin", "Margin": "0.20", "Laminate Length": "61348.037230896836", "Total Cost EUR": "105474.72", "Total Cost USD": "122350.68", "Cost/Kg EUR": "21.094944", "Cost/Kg USD": "24.47013504", "Sell Price EUR": "25.31", "Sell Price USD": "29.36", "Structure": "NK 23 | TIPA 312 MET 25 | TIPA 312 MET 25 | RM G Epotal ECO 3675 6"}, {"Laminate": "608", "Total Thickness": "100", "Width of Reel": "900", "Amount": "7000", "PR/NonPR": "Not Printed", "No of Colors": "0", "Shipment": "Europe to Europe", "Supplier": "Bastin", "Margin": "0.25", "Laminate Length": "56956.180355813405", "Total Cost EUR": "67585.10", "Total Cost USD": "78398.71", "Cost/Kg EUR": "9.655014285714286", "Cost/Kg USD": "11.199816571428571", "Sell Price EUR": "12.08", "Sell Price USD": "14.00", "Structure": "NK 23 | TIPA 302FG 60 | PBAT 17"}];const fields=['Laminate','Total Thickness','Width of Reel','Amount','PR/NonPR','No of Colors','Shipment','Supplier','Margin'];const resultFields=['Laminate Length','Total Cost EUR','Total Cost USD','Cost/Kg EUR','Cost/Kg USD','Sell Price EUR','Sell Price USD'];function uniq(f){return [...new Set(DATA.map(r=>String(r[f])))]}function renderInputs(){document.getElementById('inputs').innerHTML=fields.map(f=>`<div class="row"><label>${f}</label><div class="val"><select data-f="${f}" onchange="refresh()">${uniq(f).map(v=>`<option>${v}</option>`).join('')}</select></div><div class="unit">select</div></div>`).join('');refresh()}function current(){let o={};document.querySelectorAll('[data-f]').forEach(e=>o[e.dataset.f]=e.value);return o}function findRow(o){return DATA.find(r=>fields.every(f=>String(r[f])===String(o[f])))}function refresh(){let r=findRow(current());if(!r){document.getElementById('msg').innerHTML='<div class="warn">No exact Excel lookup for this selection. Generate this row with the Office Script.</div>';document.getElementById('results').innerHTML='';document.getElementById('structure').textContent='';return}document.getElementById('msg').innerHTML='<div class="exact">Exact Excel lookup value used.</div>';document.getElementById('results').innerHTML=resultFields.map(f=>`<div class="row"><label>${f}</label><div class="val">${r[f]}</div><div class="unit"></div></div>`).join('')+`<div class="sell">▦ SELL PRICE</div><div class="sellPrice">${r['Sell Price EUR']}</div>`;document.getElementById('structure').textContent='Structure from Excel: '+(r.Structure||'')}function parseCsv(txt){let lines=txt.trim().split(/?
/);let h=lines.shift().split(',').map(x=>x.trim());return lines.map(line=>{let cells=[];let cur='',q=false;for(let ch of line){if(ch==='"')q=!q;else if(ch===','&&!q){cells.push(cur);cur=''}else cur+=ch}cells.push(cur);let o={};h.forEach((k,i)=>o[k]=cells[i]||'');return o})}function loadCsvFile(e){let file=e.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=()=>{DATA=parseCsv(reader.result);renderInputs()};reader.readAsText(file)}function installApp(){alert('Install: iPhone Safari → Share → Add to Home Screen. Android/Chrome/Edge → menu → Install app.')}renderInputs();if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});</script></body></html>
