<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TIPA Login</title><link rel="manifest" href="manifest.webmanifest"><meta name="theme-color" content="#10bcd6"><link rel="apple-touch-icon" href="icon-192.png"><style>body{margin:0;min-height:100vh;font-family:Arial;background:linear-gradient(180deg,#e9fbff,#edf6f8);display:flex;align-items:center;justify-content:center}.box{width:min(390px,92%);background:white;border-radius:28px;padding:28px;box-shadow:0 18px 52px rgba(16,42,67,.15);text-align:center}.conf{margin:12px 0;padding:12px;border-radius:16px;background:#fff3cd;border:1px solid #ffd966;color:#6f4e00;font-weight:900}input{width:100%;box-sizing:border-box;border:1px solid #d9e8ee;border-radius:16px;padding:15px;font-size:17px}button{width:100%;margin-top:12px;border:0;border-radius:16px;background:linear-gradient(135deg,#0a9fbd,#12cbe7);color:white;padding:15px;font-weight:900;font-size:16px}.install{background:#102a43;font-size:18px}.err{color:#c62828;font-weight:900;margin-top:10px;min-height:20px}.logo{width:86px;height:86px;object-fit:contain;border-radius:20px}</style></head><body><div class="box"><img src="icon-192.png" class="logo"><h1>TIPA Calculator</h1><div class="conf">CONFIDENTIAL — internal pricing tool</div><input id="p" type="password" placeholder="Enter password" autofocus><button onclick="go()">Login</button><button class="install" onclick="installTIPA()">⬇️ INSTALL APP</button><div id="e" class="err"></div></div><script>
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});
window.addEventListener('appinstalled',()=>{deferredPrompt=null;});
async function installTIPA(){if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;}else{alert('If no install prompt appears: Chrome/Edge menu → Install app or Add to Home screen. On iPhone: Share → Add to Home Screen.');}}
if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js');}
function go(){if(document.getElementById('p').value==='TIPA2026'){sessionStorage.setItem('auth','1');window.location.replace('index.html')}else{document.getElementById('e').innerText='Wrong password';document.getElementById('p').value='';}}document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')go()});</script></body></html>
