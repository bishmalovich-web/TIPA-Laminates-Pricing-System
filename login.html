<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TIPA Login</title><link rel="manifest" href="manifest.webmanifest"><meta name="theme-color" content="#071827"><link rel="apple-touch-icon" href="icon-192.png"><style>
:root{--bg:#071827;--panel:#0d2638;--panel2:#102f45;--line:#1b4a63;--text:#ecfbff;--muted:#9cc2d1;--cyan:#10bcd6;--cyan2:#1bd4f0;--warn:#ffe6a3;--danger:#ff5c7a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#113850 0,#071827 55%,#05101d 100%);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}.app{max-width:1180px;margin:auto;padding:14px}.hero{display:flex;gap:14px;align-items:center;background:linear-gradient(135deg,#0e9fba,#16cdea);border-radius:24px;padding:16px;box-shadow:0 18px 45px #0007}.logo{width:76px;height:76px;border-radius:18px;background:white;object-fit:contain}h1{margin:0;font-size:clamp(24px,6vw,42px);letter-spacing:-.04em}.hero p{margin:4px 0 0;font-weight:800}.top{position:sticky;top:8px;z-index:10;display:flex;gap:8px;justify-content:flex-end;margin:8px 0}.btn{border:0;border-radius:16px;padding:13px 16px;font-weight:900;color:white;background:#193c54;box-shadow:0 12px 26px #0004}.btn.install{background:linear-gradient(135deg,var(--cyan),var(--cyan2));font-size:17px}.bigInstall{width:100%;margin:14px 0;border:0;border-radius:20px;background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:white;font-size:22px;font-weight:950;padding:18px;box-shadow:0 16px 36px #10bcd655}.conf{margin:12px 0;padding:12px;border-radius:16px;background:#3d3218;border:1px solid #ac8428;color:#ffdc79;font-weight:900;text-align:center}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:800px){.grid{grid-template-columns:1fr}.app{padding:10px}.top{position:static}.logo{width:64px;height:64px}}.card{background:linear-gradient(180deg,var(--panel),#0a2030);border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 18px 50px #0006}.fields,.results{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:420px){.fields,.results{grid-template-columns:1fr}}label{display:block;color:#b7d8e4;font-size:12px;font-weight:900;margin-bottom:6px}select,input{width:100%;border:1px solid #27617d;background:#081c2a;color:var(--text);border-radius:14px;padding:12px;font-size:16px;outline:none}select:disabled,input:disabled{opacity:.55}.metric{background:linear-gradient(180deg,#12364c,#0c2a3d);border:1px solid #1f536d;border-radius:18px;padding:14px;min-width:0}.metric .k{color:var(--muted);font-size:12px;font-weight:900}.metric .v{font-size:clamp(20px,5vw,30px);font-weight:950;white-space:normal;overflow-wrap:anywhere}.sell{grid-column:1/-1;background:linear-gradient(135deg,#0aa8c1,#10d0ea);color:white}.sell .k{color:#e9fbff}.notice{color:#b7d8e4;font-size:12px;margin-top:-6px;margin-bottom:10px}.layerList{display:grid;gap:10px}.layerRow{display:grid;grid-template-columns:38px minmax(0,1.55fr) 78px 96px 78px;gap:8px;align-items:center;padding:10px;border-radius:14px;background:#0a2030;border:1px solid #173d55}.layerRow.head{background:#12364c;color:#bdefff;font-size:12px;font-weight:900}.layerRow div{min-width:0;overflow-wrap:anywhere}.price{text-align:right;color:#eafcff;font-variant-numeric:tabular-nums}@media(max-width:520px){.layerRow{grid-template-columns:28px minmax(0,1fr) 52px 72px 60px;font-size:12px;padding:8px;gap:6px}.layerRow.head{font-size:11px}.price{text-align:right}.hero{padding:12px}.bigInstall{font-size:18px;padding:15px}.card{padding:12px;border-radius:20px}}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}.loginBox{max-width:420px;width:100%;background:linear-gradient(180deg,var(--panel),#0a2030);border:1px solid var(--line);border-radius:28px;padding:24px;text-align:center;box-shadow:0 20px 60px #0008}.loginBox .logo{width:88px;height:88px}.loginBox input{margin-top:10px}.loginBox button{width:100%;margin-top:12px}</style></head><body><div class="login"><div class="loginBox"><img class="logo" src="icon-192.png"><h1>TIPA Calculator</h1><div class="conf">CONFIDENTIAL — internal pricing tool</div><input id="p" type="password" placeholder="Enter password" autofocus><button class="bigInstall" style="margin-bottom:0" onclick="go()">Login</button><button class="btn install" onclick="installTIPA()">⬇️ INSTALL APP</button><div id="e" class="notice" style="color:#ff8aa0"></div></div></div><script>let deferredPrompt=null;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});window.addEventListener('appinstalled',()=>{deferredPrompt=null;});async function installTIPA(){if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null}else{alert('If no install prompt appears: Chrome/Edge menu → Install app or Add to Home screen. On iPhone: Share → Add to Home Screen.')}}if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js')}function go(){if(document.getElementById('p').value==='TIPA2026'){sessionStorage.setItem('auth','1');location.replace('index.html')}else{document.getElementById('e').textContent='Wrong password';document.getElementById('p').value=''}}document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')go()})</script></body></html>
